include:
  - local: .gitlab/generated.gitlab-ci.yml

variables:
  UV_CACHE_DIR: .cache/uv

# ── Reusable setup template ───────────────────────────────────────────────────

.uv_dev:
  image: python:3.13
  cache:
    key:
      files:
        - uv.lock
        - pyproject.toml
      prefix: uv-3.13
    paths:
      - .cache/uv/
      - .venv/
  before_script:
    - pip install uv bam-tool
    - uv sync --dev --frozen

# ── Lint ─────────────────────────────────────────────────────────────────────

lint:
  extends:
    - .lint
    - .uv_dev
  stage: lint

format-check:
  extends:
    - .format-check
    - .uv_dev
  stage: lint

typecheck:
  extends:
    - .typecheck
    - .uv_dev
  stage: lint

# ── Test ─────────────────────────────────────────────────────────────────────

test-unit:
  extends:
    - .test-unit
    - .uv_dev
  stage: test

test-integration:
  extends:
    - .test-integration
    - .uv_dev
  stage: test

test-component:
  extends:
    - .test-component
    - .uv_dev
  stage: test

# ── Build ─────────────────────────────────────────────────────────────────────

build:
  extends:
    - .build
    - .uv_dev
  stage: build
  artifacts:
    paths:
      - dist/
    expire_in: 7 days

