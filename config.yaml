---
name: Shopping List
version: "0.1.8"
slug: ha_shopping_list
description: A fast, mobile-friendly shopping list for Home Assistant.
url: https://github.com/ladidadida/ha_shopping_list
image: ghcr.io/ladidadida/ha_shopping_list/{arch}

arch:
  - aarch64
  - amd64

ingress: true
ingress_port: 8099
panel_icon: mdi:cart
panel_title: Shopping List
panel_admin: false

startup: application
boot: auto
init: false

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: "REST API – direct access for automations (set api_key first)"

options:
  log_level: info
  api_key: ""
schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  api_key: str
