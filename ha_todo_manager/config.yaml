---
name: Todo Manager
version: "0.1.3"
slug: ha_todo_manager2
description: A Kanban-style todo manager for Home Assistant.
url: https://github.com/ladidadida/ladis_list
image: ghcr.io/ladidadida/ha_todo_manager/{arch}

arch:
  - aarch64
  - amd64

ingress: true
ingress_port: 8100
panel_icon: mdi:checkbox-marked-outline
panel_title: Todo Manager
panel_admin: false
hassio_api: true
homeassistant_api: true

startup: application
boot: auto
init: false

options:
  log_level: info
  ha_webhook_secret: ""
  person_sync_interval_hours: 6
  materialise_interval_minutes: 60
schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  ha_webhook_secret: str
  person_sync_interval_hours: int(1,168)
  materialise_interval_minutes: int(1,1440)
